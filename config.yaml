# Candidate Ookla Speedtest server IDs, tried in order. Use [] for auto-select.
# Find IDs by running: python monitor.py --list-servers
server_ids:
  - 28910
  - 48463
server_fallback: true   # if all configured server_ids fail, fall back to auto-select
speedtest_binary: speedtest
speedtest_timeout: 120  # seconds before an individual Ookla CLI run times out

# Run one full Ookla Speedtest every interval seconds
interval: 60

output_dir: results   # folder to store CSV files; contents are git-ignored
